<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Cobro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f6f5f2;          /* gris muy claro de fondo */
    --card:#ffffff;
    --ink:#1c2433;         /* navy oscuro (como Treinta) */
    --mut:#9aa1ad;
    --line:#ececec;
    --yellow:#f8d967;      /* amarillo pedido */
    --yellow2:#fdf3cf;
    --green:#1f6b4e;
    --green2:#e8f4ec;
    --mint:#2fae74;
    --amber:#f2a93b;
    --blue:#3a7bd5;--credit:#3a7bd5;
    --warn:#c9821f;--bad:#d4583e;
    --shadow:0 2px 12px rgba(28,36,51,.05);
  }
  html{background:var(--bg)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;min-height:100vh;font-family:'Nunito',ui-rounded,'SF Pro Rounded',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45}
  .demo{background:#fef6da;color:#8a6d12;text-align:center;font-size:11px;font-weight:700;padding:5px}
  header{position:sticky;top:0;z-index:50;background:var(--yellow);padding:16px 18px 18px}
  .htop{display:flex;justify-content:space-between;align-items:center}
  .htop h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.3px;color:var(--ink)}
  .htop .rep{background:var(--ink);border:none;color:#fff;border-radius:12px;padding:10px 17px;font-size:13px;font-weight:700;cursor:pointer}
  .daytot{margin-top:15px}
  .daytot .l{font-size:11px;color:#977c1a;text-transform:uppercase;letter-spacing:.7px;font-weight:800;display:block}
  .daytot .v{font-size:30px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.8px;margin-top:2px;display:block}
  .daysub{margin-top:4px;font-size:12.5px;color:#977c1a;font-weight:600}
  .daysub b{color:#1c2433}.daysub i{color:#8a5a12;font-style:normal}
  main{padding:16px;max-width:720px;margin:0 auto;padding-bottom:90px}
  .ruteros{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .rchip{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:24px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
  .rchip.on{background:var(--green);border-color:var(--green);color:#fff}
  .rchip .tot{font-size:11px;opacity:.85;font-weight:600;margin-left:6px}
  .empty{color:var(--mut);text-align:center;padding:44px 16px;font-size:14px}
  .panelR{background:transparent;border-radius:16px}
  .prHead{padding:4px 4px 16px;display:flex;justify-content:space-between;align-items:center}
  .prHead .nm{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .prHead .sub{font-size:12.5px;color:var(--mut);margin-top:2px}
  .prHead .nb{background:var(--mint);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 3px 10px rgba(52,179,122,.3)}
  /* viaje cerrado: tarjeta gris discreta */
  .vcard{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
  .vcol{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;cursor:pointer}
  .vcol .vl{font-weight:800;font-size:15px}
  .vcol .vl .vsub{font-size:12px;color:var(--mut);font-weight:500;margin-top:2px}
  .vcol .vr{display:flex;align-items:center;gap:11px}
  .vcol .vm{font-weight:800;font-variant-numeric:tabular-nums;color:var(--green);font-size:16px}
  .vcol .chev{color:var(--mut);font-size:12px}
  .vstat{font-size:9.5px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
  .vs-done{background:var(--green2);color:var(--green)}
  /* viaje ABIERTO: tarjeta destacada con borde verde y header de color */
  .vcard.abierta{border:2px solid var(--mint);box-shadow:0 6px 20px rgba(52,179,122,.18)}
  .vhead-open{background:var(--green);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
  .vhead-open .t{font-weight:800;font-size:16px}
  .vhead-open .s{font-size:12px;opacity:.85;margin-top:2px}
  .vhead-open .badge{background:rgba(255,255,255,.2);color:#fff;font-size:9.5px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase}
  .viaje{}
  .ped{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:13px 16px;border-top:1px solid var(--line);cursor:pointer}
  .ped:first-of-type{border-top:none}
  .ped .pn{font-weight:700}
  .ped .pm{text-align:right;font-variant-numeric:tabular-nums;font-weight:800;white-space:nowrap}
  .ped .sub{font-size:11.5px;color:var(--mut);margin-top:1px}
  .ped.prob{background:var(--yellow2)}
  .tag{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:12px;margin-left:7px}
  .t-cred{background:#e7f0fb;color:var(--credit)}.t-dev{background:var(--yellow2);color:var(--warn)}.t-canc{background:#fbe9e4;color:var(--bad)}
  .pbox{padding:14px 16px;border-top:1px solid var(--line);background:#faf8f3;display:none}
  .pbox.open{display:block}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .chip.on{background:var(--green);border-color:var(--green);color:#fff}
  .ajustes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .efline{margin-top:13px;display:flex;justify-content:space-between;align-items:center}
  .efline .e{font-size:13px;color:var(--mut)}.efline .e b{color:var(--green);font-size:16px;margin-left:5px}
  input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:12px 12px;font-size:16px;font-family:inherit}
  input:focus{outline:none;border-color:var(--mint)}
  input::placeholder{color:#b9c0ba}
  label.fld{display:block;font-size:10px;color:var(--mut);font-weight:700;margin:0 0 4px 1px;text-transform:uppercase;letter-spacing:.3px}
  .entrada{padding:14px 16px;border-top:1px solid var(--line);display:grid;grid-template-columns:1.7fr 1fr;gap:8px}
  .vfoot{padding:14px 16px;display:flex;gap:10px;align-items:center;border-top:1px solid var(--line);background:#faf8f3}
  .vfoot .vtot{flex:1;font-size:13px}.vfoot .vtot b{color:var(--green);font-size:17px}
  .btn{border:none;border-radius:12px;padding:12px 15px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--green);color:#fff}
  .btn.ok{background:var(--mint);color:#fff;box-shadow:0 3px 10px rgba(52,179,122,.3)}
  .btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  /* reporte */
  .overlay{position:fixed;inset:0;background:rgba(31,42,36,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:720px;max-height:90vh;overflow:auto;border-radius:22px 22px 0 0}
  .shHead{position:sticky;top:0;background:var(--card);padding:18px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;z-index:2}
  .shHead h2{margin:0;font-size:19px;font-weight:800}
  .shHead .x{background:none;border:none;color:var(--mut);font-size:26px;cursor:pointer;line-height:1}
  .rday{padding:24px 16px;text-align:center;background:var(--green);color:#fff}
  .rday .l{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.7px;font-weight:700}
  .rday .v{font-size:36px;font-weight:800;margin-top:5px;letter-spacing:-1px}
  .rday .x2{font-size:12.5px;opacity:.85;margin-top:7px}
  .rm{padding:16px;margin:12px 16px 0;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .rm .mh{display:flex;justify-content:space-between;align-items:baseline}
  .rm .mn{font-size:16px;font-weight:800}
  .rm .mt{font-size:18px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}
  .rm .det{margin-top:9px}
  .rm .dl{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--mut)}
  .rm .dl .r{font-variant-numeric:tabular-nums;font-weight:700}
  .rm .dl.cr{color:var(--credit)}.rm .dl.aj{color:var(--warn)}
  .copyb{margin:18px 16px;width:calc(100% - 32px)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 20px;border-radius:24px;font-weight:700;font-size:14px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 6px 20px rgba(31,42,36,.25)}
  .toast.show{opacity:1}.toast.err{background:var(--bad)}
  /* ===== Botón Enviar ruta premium ===== */
  @keyframes flota{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes halo{0%{box-shadow:0 8px 22px rgba(214,110,30,.4),0 0 0 0 rgba(245,140,50,.5)}70%{box-shadow:0 8px 22px rgba(214,110,30,.4),0 0 0 16px rgba(245,140,50,0)}100%{box-shadow:0 8px 22px rgba(214,110,30,.4),0 0 0 0 rgba(245,140,50,0)}}
  @keyframes brillo{0%{left:-60%}60%,100%{left:130%}}
  @keyframes checkpop{0%{transform:scale(.6);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .enviar-wrap{padding:2px 16px 18px}
  .btn-enviar{position:relative;overflow:hidden;width:100%;border:none;cursor:pointer;font-family:inherit;
    border-radius:16px;padding:15px 18px;color:#fff;
    background:linear-gradient(135deg,#f7991f 0%,#e8770f 100%);
    display:flex;align-items:center;justify-content:center;gap:12px;
    animation:halo 1.8s ease-in-out infinite, flota 2.4s ease-in-out infinite}
  .btn-enviar:active{transform:scale(.97)}
  .btn-enviar .ico{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.92);
    display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.18);animation:checkpop .5s ease-out;flex-shrink:0}
  .btn-enviar .ico svg{width:21px;height:21px}
  .btn-enviar .txt{display:flex;flex-direction:column;align-items:flex-start;line-height:1.15}
  .btn-enviar .txt b{font-size:18px;font-weight:900;letter-spacing:.2px}
  .btn-enviar .txt small{font-size:11.5px;font-weight:600;opacity:.92}
  .btn-enviar .shine{position:absolute;top:0;left:-60%;width:45%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);
    transform:skewX(-20deg);animation:brillo 2.8s ease-in-out infinite}
</style>
</head>
<body>
<div class="demo" style="background:#e8f4ec;color:#1f6b4e">☁ Guardado en la nube — se comparte entre dispositivos</div>
<header>
  <div class="htop"><h1>Control de Cobro <span id="syncDot" style="font-size:11px;font-weight:700;color:#977c1a;margin-left:4px"></span></h1><div style="display:flex;gap:7px">
    <button class="rep" style="background:#e8902a;display:flex;align-items:center;gap:6px" onclick="abrirAuditoria()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 20h4l10-10a2 2 0 0 0-3-3L5 17v3z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Cambios</button>
    <button class="rep" style="display:flex;align-items:center;gap:6px" onclick="abrirReporte()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 18V10M12 18V5M18 18v-6" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>Reporte</button>
  </div></div>
  <div class="daytot"><span class="l">Efectivo del día</span><span class="v" id="tEfectivo">Q0.00</span></div>
  <div class="daysub" id="daySub"></div>
  <div id="alerta" style="display:none;margin-top:10px;background:#fff3e0;border:1px solid #f0c98a;color:#8a5a12;border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:600"></div>
</header>

<main>
  <div class="ruteros" id="ruteros"></div>
  <div id="zona"><div class="empty">Agregá un repartidor para empezar.</div></div>
</main>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div id="toast" class="toast"></div>

<script>
// ===== Conexión a la nube (Supabase) =====
const SB_URL='https://shlolncjhfzqmcllwjrk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobG9sbmNqaGZ6cW1jbGx3anJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzU5NjQsImV4cCI6MjA5NzYxMTk2NH0.CnXj2cX5V_XDy902rFN88PU_rMPEb5qdqHmAiyFXpvk';
const sb=supabase.createClient(SB_URL,SB_KEY);
const HOY=new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
let guardando=false, guardarPend=false, _cargando=true;

let ruteros=[];
const PALETA=['#2fae74','#3a7bd5','#d4583e','#9b59b6','#e8902a','#1ab5a5','#c2407a','#5d6d7e'];
function colorRutero(r){const i=ruteros.indexOf(r);return PALETA[i%PALETA.length];}
let viajes=[];
let selRutero=null, idv=1, idp=1;
let viajeAbierto=null; // id del viaje cerrado que se está viendo expandido
let auditoria=[];

// Guarda todo el estado del día en la nube (con anti-spam)
async function guardarNube(){
  if(guardando){guardarPend=true;return;}
  guardando=true;
  const d=document.getElementById('syncDot'); if(d)d.textContent='guardando…';
  const estado={ruteros,viajes,auditoria,idv,idp};
  try{
    const{error}=await sb.from('dias').upsert({fecha:HOY,estado,actualizado_en:new Date().toISOString()},{onConflict:'fecha'});
    if(d)d.textContent=error?'⚠ sin guardar':'✓ guardado';
    if(error)console.log('guardar error',error);
  }catch(e){if(d)d.textContent='⚠ sin internet';console.log('guardar err',e);}
  guardando=false;
  if(guardarPend){guardarPend=false;guardarNube();}
}
// Carga el estado del día desde la nube
async function cargarNube(){
  try{
    const{data}=await sb.from('dias').select('estado').eq('fecha',HOY).maybeSingle();
    if(data&&data.estado){
      const e=data.estado;
      ruteros=e.ruteros||[];viajes=e.viajes||[];auditoria=e.auditoria||[];idv=e.idv||1;idp=e.idp||1;
    }
  }catch(e){console.log('cargar err',e);}
}


const q=n=>'Q'+Number(n||0).toLocaleString('es-GT',{minimumFractionDigits:2,maximumFractionDigits:2});
const hhmm=d=>d?new Date(d).toLocaleTimeString('es-GT',{hour:'2-digit',minute:'2-digit'}):'';
function duracion(a,b){if(!a||!b)return '';let m=Math.round((new Date(b)-new Date(a))/60000);if(m<1)return '<1 min';if(m<60)return m+' min';const h=Math.floor(m/60);return h+'h '+(m%60)+'min';}
const toast=(m,e)=>{const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' err':'');setTimeout(()=>t.className='toast',1400);};

function efectivoDe(p){
  if(p.estado==='cancelado'||p.estado==='credito')return 0;
  return Math.max(0,(p.total||0)-(p.devolucion||0)-(p.descuento||0)+(p.vuelto||0));
}
function ajusteDe(p){return (p.devolucion||0)+(p.descuento||0)+(p.vuelto||0);}
function efectivoViaje(v){let s=0;v.pedidos.forEach(p=>s+=efectivoDe(p));return s;}
function totalRutero(r){let s=0;viajes.filter(v=>v.rutero===r&&v.cerrado).forEach(v=>s+=efectivoViaje(v));return s;}

function recalc(){
  let efv=0,cred=0,diff=0,pendientes=[];
  viajes.forEach(v=>{
    if(!v.cerrado){
      // viaje no recibido: si ya salió, es pendiente de recibir
      if(v.entradaLista)pendientes.push(v);
      return; // NO suma al efectivo hasta recibir
    }
    v.pedidos.forEach(p=>{
      if(p.estado==='credito'){cred+=p.total||0;return;}
      if(p.estado==='cancelado')return;
      efv+=efectivoDe(p);diff+=ajusteDe(p);
    });
  });
  document.getElementById('tEfectivo').textContent=q(efv);
  let sub=[];
  if(cred>0)sub.push(`Crédito <b>${q(cred)}</b>`);
  if(diff>0)sub.push(`Ajustes <i>${q(diff)}</i>`);
  document.getElementById('daySub').innerHTML=sub.join(' · ');
  // alerta de pendientes
  const al=document.getElementById('alerta');
  if(pendientes.length){
    const nombres=pendientes.map(v=>v.rutero+' (V'+(viajes.filter(x=>x.rutero===v.rutero).indexOf(v)+1)+')').join(', ');
    al.innerHTML=`⚠ Pendiente de recibir dinero de: <b>${nombres}</b>`;al.style.display='block';
  } else {al.style.display='none';}
}

function renderRuteros(){
  const c=document.getElementById('ruteros');
  const icoP=col=>`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="8" r="3.4" stroke="${col}" stroke-width="2"/><path d="M5.5 19c0-3.2 3-5.2 6.5-5.2s6.5 2 6.5 5.2" stroke="${col}" stroke-width="2" stroke-linecap="round"/></svg>`;
  c.innerHTML=ruteros.map(r=>{const t=totalRutero(r);const col=colorRutero(r);
    const on=selRutero===r;
    return `<div class="rchip ${on?'on':''}" style="${on?'background:'+col+';border-color:'+col:''};display:inline-flex;align-items:center" onclick="selR('${r}')">
      ${icoP(on?'#fff':col)}${r}${t>0?'<span class="tot">'+q(t)+'</span>':''}</div>`;
  }).join('')+`<div class="rchip" style="border-style:dashed;color:var(--mut);display:inline-flex;align-items:center;padding:0" onclick="document.getElementById('newRutero').focus()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="margin:0 4px 0 14px"><path d="M12 6v12M6 12h12" stroke="#9aa1ad" stroke-width="2.2" stroke-linecap="round"/></svg>
      <input id="newRutero" placeholder="Agregar vendedor" style="width:135px;border:none;background:none;padding:10px 14px 10px 2px" onkeydown="if(event.key==='Enter')addRutero()"></div>`;
}
function addRutero(){const el=document.getElementById('newRutero');const n=(el.value||'').trim();if(n){ruteros.push(n);selRutero=n;renderRuteros();renderZona();}}
function selR(r){selRutero=r;viajeAbierto=null;renderRuteros();renderZona();}

function nuevoViaje(){if(!selRutero)return;const v={id:idv++,rutero:selRutero,pedidos:[],cerrado:false,envases:'',envOk:false,entradaLista:false,pedidosListos:false};viajes.push(v);renderZona();
  setTimeout(()=>{const el=document.getElementById('in-nom-'+v.id);if(el)el.focus();},50);}
function terminarPedidos(vid){const v=viajes.find(x=>x.id===vid);if(!v)return;
  const elN=document.getElementById('in-nom-'+vid), elM=document.getElementById('in-mon-'+vid);
  if(elN&&elM&&(elN.value||'').trim()&&!isNaN(parseFloat(elM.value))){
    v.pedidos.push({id:idp++,nombre:elN.value.trim(),total:parseFloat(elM.value),estado:'pagado',devolucion:0,descuento:0,vuelto:0});
  }
  if(v.pedidos.length===0){toast('Agregá al menos un pedido',true);return;}
  const elE=document.getElementById('env-'+vid);if(elE)v.envases=elE.value;
  v.entradaLista=true;v.horaSalida=new Date();renderZona();}
function terminarAnotar(vid){const v=viajes.find(x=>x.id===vid);if(!v)return;
  const elN=document.getElementById('in-nom-'+vid), elM=document.getElementById('in-mon-'+vid);
  if(elN&&elM&&(elN.value||'').trim()&&!isNaN(parseFloat(elM.value))){
    v.pedidos.push({id:idp++,nombre:elN.value.trim(),total:parseFloat(elM.value),estado:'pagado',devolucion:0,descuento:0,vuelto:0});
  }
  if(v.pedidos.length===0){toast('Agregá al menos un pedido',true);return;}
  v.pedidosListos=true;renderZona();}
function volverAnotar(vid){const v=viajes.find(x=>x.id===vid);if(v){v.pedidosListos=false;renderZona();}}
function reabrirEntrada(vid){const v=viajes.find(x=>x.id===vid);if(v){v.entradaLista=false;v.pedidosListos=true;renderZona();}}

function keyNom(e,vid){if(e.key==='Enter'){e.preventDefault();const m=document.getElementById('in-mon-'+vid);if(m)m.focus();}}
function keyMon(e,vid){if(e.key==='Enter'){e.preventDefault();e.stopPropagation();addPedido(vid);}}
function addPedido(vid){
  const v=viajes.find(x=>x.id===vid);if(!v)return;
  const elN=document.getElementById('in-nom-'+vid), elM=document.getElementById('in-mon-'+vid);
  const nom=(elN.value||'').trim();const tot=parseFloat(elM.value);
  if(!nom||isNaN(tot)){toast('Falta nombre o cantidad',true);return;}
  v.pedidos.push({id:idp++,nombre:nom,total:tot,estado:'pagado',devolucion:0,descuento:0,vuelto:0});
  renderZona();
  setTimeout(()=>{const el=document.getElementById('in-nom-'+vid);if(el){el.value='';el.focus();}},30);
}
function setEnvases(vid,val){const v=viajes.find(x=>x.id===vid);if(!v)return;const tenia=!!(v.envases||'').trim();v.envases=val;const tiene=!!val.trim();if(tenia!==tiene){renderZona();setTimeout(()=>{const el=document.getElementById('env-'+vid);if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},20);}}
function setEnvasesSilent(vid,val){const v=viajes.find(x=>x.id===vid);if(v)v.envases=val;}
function toggleEnvOk(vid){const v=viajes.find(x=>x.id===vid);if(v){v.envOk=!v.envOk;renderZona();}}
function recibirTodo(vid){const v=viajes.find(x=>x.id===vid);if(!v||v.pedidos.length===0){toast('Sin pedidos',true);return;}
  if((v.envases||'').trim()&&!v.envOk){toast('Marcá el check de envases',true);return;}
  v.pedidos.forEach(p=>{if(p.snapEf===undefined)p.snapEf=efectivoDe(p);});
  v.cerrado=true;v.horaRecibido=new Date();viajeAbierto=null;renderZona();toast('Viaje recibido ✓');}
function logAudit(accion,detalle){auditoria.unshift({hora:new Date(),accion,detalle});}

function reabrir(vid){const v=viajes.find(x=>x.id===vid);if(v){
  logAudit('REABRIÓ','Viaje '+(viajes.filter(x=>x.rutero===v.rutero).indexOf(v)+1)+' de '+v.rutero+' (recibido '+hhmm(v.horaRecibido)+')');
  v.cerrado=false;v.entradaLista=true;viajeAbierto=null;v.modificado=true;renderZona();toast('⚠ Viaje reabierto — quedó registrado');}}
function borrarViaje(vid){viajes=viajes.filter(x=>x.id!==vid);renderZona();}
function verViaje(vid){viajeAbierto=viajeAbierto===vid?null:vid;renderZona();}

function abrirPed(vid,pid){const el=document.getElementById('pb-'+vid+'-'+pid);
  document.querySelectorAll('.pbox').forEach(b=>{if(b!==el)b.classList.remove('open');});el.classList.toggle('open');}
function cerrarPed(vid,pid){const el=document.getElementById('pb-'+vid+'-'+pid);if(el)el.classList.remove('open');renderZona();}
function setEst(vid,pid,est){const p=viajes.find(x=>x.id===vid).pedidos.find(x=>x.id===pid);
  p.estado=est;if(est!=='pagado'){p.devolucion=0;p.descuento=0;p.vuelto=0;}renderZona();
  const el=document.getElementById('pb-'+vid+'-'+pid);if(el)el.classList.add('open');}
function setAj(vid,pid,campo,val){const v=viajes.find(x=>x.id===vid);const p=v.pedidos.find(x=>x.id===pid);
  p[campo]=parseFloat(val)||0;
  if(p.snapEf!==undefined&&Math.abs(p.snapEf-efectivoDe(p))>0.001){
    logAudit('CAMBIÓ MONTO',`${p.nombre} (${v.rutero}): antes ${q(p.snapEf)} → ahora ${q(efectivoDe(p))}`);
    p.snapEf=efectivoDe(p);v.modificado=true;
  }
  recalc();renderRuteros();
  const e=document.getElementById('ef-'+vid+'-'+pid);if(e)e.textContent=q(efectivoDe(p));}

function pedidoSub(p){
  const orig='Cuenta: '+q(p.total);
  if(p.estado==='credito')return '<span style="color:var(--credit)">'+orig+' · a crédito</span>';
  if(p.estado==='cancelado')return '<span style="color:var(--bad)">'+orig+' · no se entregó</span>';
  const a=ajusteDe(p);
  if(a>0){let parts=[];if(p.devolucion)parts.push('devolución '+q(p.devolucion));if(p.descuento)parts.push('descuento '+q(p.descuento));if(p.vuelto)parts.push('vuelto '+q(p.vuelto));
    return orig+' · <span style="color:var(--warn)">'+parts.join(' · ')+'</span>';}
  return 'de '+q(p.total);
}
function pedTag(p){
  if(p.estado==='credito')return '<span class="tag t-cred">crédito</span>';
  if(p.estado==='cancelado')return '<span class="tag t-canc">no entreg.</span>';
  if(ajusteDe(p)>0)return '<span class="tag t-dev">ajuste</span>';
  return '';
}

function renderPedidos(v,editable){
  return v.pedidos.map(p=>{
    const prob=p.estado!=='pagado'||ajusteDe(p)>0;
    const ef=efectivoDe(p);
    let montoShow;
    if(p.estado==='credito')montoShow=`<span style="color:var(--credit)">${q(p.total)}</span><div class="sub" style="color:var(--credit)">a crédito</div>`;
    else if(p.estado==='cancelado')montoShow=`<span style="color:var(--bad)">${q(p.total)}</span><div class="sub" style="color:var(--bad)">no entregó</div>`;
    else if(ajusteDe(p)>0)montoShow=`<span style="text-decoration:line-through;color:var(--mut);font-weight:600;font-size:13px">${q(p.total)}</span> ${q(ef)}`;
    else montoShow=q(ef);
    let row=`<div class="ped ${prob?'prob':''}" ${editable?`onclick="abrirPed(${v.id},${p.id})"`:''}>
      <div style="display:flex;align-items:center;gap:11px">
        <span style="width:38px;height:38px;border-radius:50%;background:#eef0f3;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="#9aa1ad" stroke-width="1.8"/><path d="M5 19c0-3.3 3-5.5 7-5.5s7 2.2 7 5.5" stroke="#9aa1ad" stroke-width="1.8" stroke-linecap="round"/></svg></span>
        <div><span class="pn">${p.nombre}</span>${pedTag(p)}<div class="sub">${pedidoSub(p)}</div></div>
      </div>
      <div class="pm">${montoShow}</div></div>`;
    if(editable){
      row+=`<div class="pbox" id="pb-${v.id}-${p.id}">
        <div class="chips">
          <div class="chip ${p.estado==='pagado'?'on':''}" onclick="event.stopPropagation();setEst(${v.id},${p.id},'pagado')">Pagó completo</div>
          <div class="chip ${p.estado==='credito'?'on':''}" onclick="event.stopPropagation();setEst(${v.id},${p.id},'credito')">Crédito</div>
          <div class="chip ${p.estado==='cancelado'?'on':''}" onclick="event.stopPropagation();setEst(${v.id},${p.id},'cancelado')">No se entregó</div>
        </div>
        ${p.estado==='pagado'?`<div class="ajustes">
          <div><label class="fld">Devolución</label><input inputmode="decimal" value="${p.devolucion||''}" placeholder="0" onclick="event.stopPropagation()" onchange="setAj(${v.id},${p.id},'devolucion',this.value)"></div>
          <div><label class="fld">Descuento</label><input inputmode="decimal" value="${p.descuento||''}" placeholder="0" onclick="event.stopPropagation()" onchange="setAj(${v.id},${p.id},'descuento',this.value)"></div>
          <div><label class="fld">Vuelto pend.</label><input inputmode="decimal" value="${p.vuelto||''}" placeholder="0" onclick="event.stopPropagation()" onchange="setAj(${v.id},${p.id},'vuelto',this.value)"></div>
        </div>`:''}
        <div class="efline"><span class="e">Recibido: <b id="ef-${v.id}-${p.id}">${q(ef)}</b></span>
          <button class="btn ok" style="padding:8px 18px" onclick="event.stopPropagation();cerrarPed(${v.id},${p.id})">Listo</button></div>
      </div>`;
    }
    return row;
  }).join('');
}

function renderZona(){
  recalc();renderRuteros();
  if(!_cargando)guardarNube();
  const cont=document.getElementById('zona');
  if(!selRutero){cont.innerHTML='<div class="empty">Agregá un repartidor para empezar.</div>';return;}
  const vs=viajes.filter(v=>v.rutero===selRutero);
  const totR=totalRutero(selRutero);
  let html=`<div class="panelR"><div class="prHead"><div><div class="nm">${selRutero}</div>${totR>0?`<div class="sub">Total del día: ${q(totR)}</div>`:''}</div>
    <button class="nb" onclick="nuevoViaje()">+ Nuevo viaje</button></div>`;
  if(vs.length===0){html+='<div class="empty">Sin viajes todavía.</div>';}

  vs.forEach((v,i)=>{
    const efv=efectivoViaje(v);
    // CERRADO y no expandido -> tarjeta gris, una línea
    if(v.cerrado&&viajeAbierto!==v.id){
      const horas=v.horaSalida?`<div class="vsub" style="margin-top:1px">Salió ${hhmm(v.horaSalida)} · recibido ${hhmm(v.horaRecibido)} · ${duracion(v.horaSalida,v.horaRecibido)}</div>`:'';
      const marca=v.modificado?'<span class="vstat" style="background:#fdeede;color:var(--bad);margin-right:6px">⚠ modificado</span>':'';
      html+=`<div class="vcard"><div class="vcol" onclick="verViaje(${v.id})">
        <div class="vl">Viaje ${i+1}<div class="vsub">${v.pedidos.length} pedidos${(v.envases||'').trim()?' · envase ✓':''}</div>${horas}</div>
        <div class="vr">${marca}<span class="vstat vs-done">Recibido</span><span class="vm">${q(efv)}</span><span class="chev">▸</span></div>
      </div></div>`;
      return;
    }
    // CERRADO expandido -> detalle sólo lectura
    if(v.cerrado&&viajeAbierto===v.id){
      html+=`<div class="vcard"><div class="vcol" onclick="verViaje(${v.id})">
        <div class="vl">Viaje ${i+1}<div class="vsub">${v.pedidos.length} pedidos</div></div>
        <div class="vr"><span class="vstat vs-done">Recibido</span><span class="vm">${q(efv)}</span><span class="chev">▾</span></div></div>`;
      html+=renderPedidos(v,false);
      if(v.horaSalida)html+=`<div style="padding:11px 16px;border-top:1px solid var(--line);font-size:12.5px;color:var(--mut)">Salió ${hhmm(v.horaSalida)} · recibido ${hhmm(v.horaRecibido)} · duró ${duracion(v.horaSalida,v.horaRecibido)}</div>`;
      if((v.envases||'').trim())html+=`<div style="padding:13px 16px;border-top:1px solid var(--line);font-size:13px;color:var(--mut)">Envases: ${v.envases} ${v.envOk?'<span style="color:var(--green);font-weight:700">✓ revisado</span>':''}</div>`;
      html+=`<div class="vfoot"><div class="vtot">Efectivo del viaje: <b>${q(efv)}</b></div><button class="btn sec" onclick="reabrir(${v.id})">Reabrir</button></div></div>`;
      return;
    }
    // ABIERTO -> tarjeta destacada
    const enRuta=v.entradaLista;
    html+=`<div class="vcard abierta" style="border-color:${colorRutero(selRutero)}"><div class="vhead-open" style="background:${colorRutero(selRutero)}">
      <div style="display:flex;align-items:center;gap:11px">
        <span style="width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M2 6h11v9H2zM13 9h4l3 3v3h-7z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><circle cx="6" cy="17.5" r="1.8" stroke="#fff" stroke-width="1.8"/><circle cx="17" cy="17.5" r="1.8" stroke="#fff" stroke-width="1.8"/></svg></span>
        <div><div class="t">Viaje ${i+1}</div><div class="s">${enRuta?'En ruta · salió '+hhmm(v.horaSalida):v.pedidos.length+' pedido(s) · cargando'}</div></div>
      </div>
      <span class="badge">${enRuta?'En ruta':'Preparando'}</span></div>`;
    html+=renderPedidos(v,true);
    if(!v.entradaLista){
      if(!v.pedidosListos){
        // FASE 1: anotar nombres
        html+=`<div class="entrada">
          <input id="in-nom-${v.id}" placeholder="Cliente" onkeydown="keyNom(event,${v.id})">
          <div style="display:grid;grid-template-columns:1fr auto;gap:6px">
            <input id="in-mon-${v.id}" inputmode="decimal" placeholder="Cantidad Q" onkeydown="keyMon(event,${v.id})">
            <button class="btn ok" style="padding:12px 16px" onclick="addPedido(${v.id})">+</button>
          </div>
        </div>
        <div style="padding:10px 16px 14px"><button class="btn" style="width:100%;background:var(--ink)" onclick="terminarAnotar(${v.id})">Cerrar pedidos</button></div>`;
      } else {
        // FASE 2: envases y salir
        html+=`<div style="padding:14px 16px;border-top:1px solid var(--line)">
          <button class="btn sec" style="font-size:12px;padding:8px 13px;margin-bottom:12px" onclick="volverAnotar(${v.id})">← Agregar más pedidos</button>
          <label class="fld">Envases que se llevó (opcional)</label>
          <input id="env-${v.id}" placeholder="ej. 2 cajas retornable" value="${(v.envases||'').replace(/"/g,'&quot;')}" oninput="setEnvasesSilent(${v.id},this.value)"></div>
        <div class="enviar-wrap">
          <button class="btn-enviar" onclick="terminarPedidos(${v.id})">
            <span class="ico"><svg viewBox="0 0 24 24" fill="none"><path d="M7 5h7a3 3 0 0 1 0 6H8a3 3 0 0 0 0 6h6" stroke="#e8770f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="5" r="2.3" fill="#e8770f"/><circle cx="17" cy="17" r="2.3" fill="#e8770f"/></svg></span>
            <span class="txt"><b>Enviar ruta</b><small>Toca para confirmar la salida</small></span>
            <span class="shine"></span>
          </button>
        </div>`;
      }
    } else {
      html+=`<div style="padding:14px 16px;border-top:1px solid var(--line)">
        ${(v.envases||'').trim()?`<label class="fld">Envases que se llevó</label>
        <div style="font-size:14px;font-weight:600;margin-bottom:11px">${v.envases}</div>
        <div onclick="toggleEnvOk(${v.id})" style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:700">
          <span style="width:25px;height:25px;border-radius:7px;border:2px solid ${v.envOk?'var(--mint)':'var(--line)'};background:${v.envOk?'var(--mint)':'transparent'};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900">${v.envOk?'✓':''}</span>
          Envase revisado y devuelto completo</div>`:'<div style="font-size:13px;color:var(--mut)">Sin envases registrados.</div>'}
        <button class="btn sec" style="font-size:12px;padding:8px 13px;margin-top:12px" onclick="reabrirEntrada(${v.id})">← Corregir pedidos o envases</button>
      </div>
      <div class="vfoot"><div class="vtot">Efectivo del viaje: <b>${q(efv)}</b></div>
        <button class="btn ok" onclick="recibirTodo(${v.id})">Dinero recibido ✓</button></div>`;
    }
    if(v.pedidos.length===0&&!v.entradaLista){
      html+=`<div style="padding:0 16px 14px"><button class="btn sec" style="width:100%" onclick="borrarViaje(${v.id})">Quitar viaje</button></div>`;
    }
    html+=`</div>`;
  });
  html+='</div>';
  cont.innerHTML=html;
}

// ---- reporte ----
function abrirReporte(){
  let efvDia=0,credDia=0;
  let h=`<div class="shHead"><h2>Reporte del día</h2><button class="x" onclick="cerrarReporte()">×</button></div>`;
  // total grande
  viajes.forEach(v=>v.pedidos.forEach(p=>{if(p.estado==='credito')credDia+=p.total||0;else if(p.estado!=='cancelado')efvDia+=efectivoDe(p);}));
  h+=`<div class="rday"><div class="l">Efectivo total recibido</div><div class="v">${q(efvDia)}</div>
    <div class="x2">${credDia>0?'Crédito del día <b>'+q(credDia)+'</b>':''}</div></div>`;
  // por muchacho
  ruteros.forEach(r=>{
    const vs=viajes.filter(v=>v.rutero===r);
    if(vs.length===0)return;
    const tot=totalRutero(r);
    const ajustes=[],creditos=[],noent=[];
    vs.forEach(v=>v.pedidos.forEach(p=>{
      if(p.estado==='credito'){creditos.push({n:p.nombre,m:p.total});return;}
      if(p.estado==='cancelado'){noent.push({n:p.nombre,m:p.total});return;}
      if(p.devolucion)ajustes.push({n:p.nombre,t:'Devolución',m:p.devolucion});
      if(p.descuento)ajustes.push({n:p.nombre,t:'Descuento',m:p.descuento});
      if(p.vuelto)ajustes.push({n:p.nombre,t:'Vuelto',m:p.vuelto});
    }));
    const col=colorRutero(r);
    h+=`<div class="rm" style="border-left:4px solid ${col}"><div class="mh"><div class="mn" style="color:${col}">${r}</div><div class="mt">${q(tot)}</div></div><div class="det">`;
    vs.filter(v=>v.cerrado&&v.horaSalida).forEach((v,k)=>{
      const idx=vs.indexOf(v)+1;
      h+=`<div class="dl"><span>Viaje ${idx}: salió ${hhmm(v.horaSalida)} → ${hhmm(v.horaRecibido)}</span><span class="r">${duracion(v.horaSalida,v.horaRecibido)}</span></div>`;
    });
    ajustes.forEach(a=>h+=`<div class="dl aj"><span>${a.n} · ${a.t}</span><span class="r">−${q(a.m)}</span></div>`);
    creditos.forEach(c=>h+=`<div class="dl cr"><span>${c.n} · crédito</span><span class="r">${q(c.m)}</span></div>`);
    noent.forEach(c=>h+=`<div class="dl" style="color:var(--bad)"><span>${c.n} · no entregó</span><span class="r">${q(c.m)}</span></div>`);
    if(!ajustes.length&&!creditos.length&&!noent.length)h+=`<div class="dl">Todo cobrado, sin novedades</div>`;
    h+=`</div></div>`;
  });
  h+=`<button class="btn copyb" onclick="copiarReporte()">Copiar para WhatsApp</button>`;
  document.getElementById('sheet').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
}
function cerrarReporte(){document.getElementById('overlay').classList.remove('open');}
function abrirAuditoria(){
  let h=`<div class="shHead"><h2>Cambios y auditoría</h2><button class="x" onclick="cerrarReporte()">×</button></div>`;
  h+=`<div class="rday" style="background:var(--bad)"><div class="l">Movimientos después de cerrar</div><div class="v">${auditoria.length}</div></div>`;
  // pedidos modificados (snapshot distinto al actual no aplica porque snap se actualiza; usamos la lista auditoria)
  if(auditoria.length===0){
    h+=`<div class="rm"><div class="dl" style="justify-content:center;padding:20px 0">Ningún cambio después de cerrar. Todo limpio ✓</div></div>`;
  } else {
    h+=`<div class="rm"><div class="det">`;
    auditoria.forEach(a=>{
      h+=`<div style="padding:11px 0;border-bottom:1px solid var(--line)">
        <div style="display:flex;justify-content:space-between"><span style="font-weight:800;color:var(--bad);font-size:13px">${a.accion}</span><span style="font-size:12px;color:var(--mut)">${hhmm(a.hora)}</span></div>
        <div style="font-size:13.5px;margin-top:2px">${a.detalle}</div></div>`;
    });
    h+=`</div></div>`;
  }
  // listado completo: montos por rutero con marca de modificados
  // (A) MONTOS ORIGINALES — todos los pedidos del día, monto sin tocar (para cruzar con Mónica)
  h+=`<div class="rm"><div class="mh"><div class="mn" style="font-size:14px">A. Montos originales (para tu sistema)</div></div>
    <div style="font-size:11.5px;color:var(--mut);margin:2px 0 8px">Todos los pedidos enviados hoy, con su monto de factura. Cruzá esta lista con Mónica.</div><div class="det">`;
  let totalOrig=0,nOrig=0;
  ruteros.forEach(r=>{const col=colorRutero(r);
    const vs=viajes.filter(v=>v.rutero===r);
    let lineas='';
    vs.forEach(v=>v.pedidos.forEach(p=>{totalOrig+=p.total;nOrig++;
      lineas+=`<div class="dl"><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin-right:6px"></span>${p.nombre}</span><span class="r">${q(p.total)}</span></div>`;}));
    if(lineas)h+=lineas;
  });
  h+=`<div class="dl" style="border-top:2px solid var(--line);margin-top:6px;padding-top:8px;font-weight:800"><span>${nOrig} pedidos en total</span><span class="r">${q(totalOrig)}</span></div>`;
  h+=`</div><button class="btn copyb" style="margin:10px 0 0" onclick="copiarOriginales()">Copiar montos originales</button></div>`;

  // (B) MONTOS MODIFICADOS — lo realmente recibido con ajustes
  h+=`<div class="rm"><div class="mh"><div class="mn" style="font-size:14px">B. Lo realmente recibido</div></div>
    <div style="font-size:11.5px;color:var(--mut);margin:2px 0 8px">Con descuentos, vueltos, créditos aplicados.</div><div class="det">`;
  let totalRecib=0;
  ruteros.forEach(r=>{const col=colorRutero(r);
    const vs=viajes.filter(v=>v.rutero===r);let lineas='';
    vs.forEach(v=>v.pedidos.forEach(p=>{
      const dif=p.total!==efectivoDe(p)||p.estado!=='pagado';
      if(p.estado!=='credito'&&p.estado!=='cancelado')totalRecib+=efectivoDe(p);
      let val=p.estado==='credito'?'crédito':(p.estado==='cancelado'?'no entregó':q(efectivoDe(p)));
      lineas+=`<div class="dl" style="${dif?'color:var(--warn)':''}"><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin-right:6px"></span>${p.nombre}${dif?' *':''}</span><span class="r">${val}</span></div>`;
    }));
    if(lineas)h+=lineas;
  });
  h+=`<div class="dl" style="border-top:2px solid var(--line);margin-top:6px;padding-top:8px;font-weight:800"><span>Total recibido en efectivo</span><span class="r">${q(totalRecib)}</span></div>`;
  h+=`</div><button class="btn copyb" style="margin:10px 0 0" onclick="copiarRecibido()">Copiar lo recibido</button></div>`;

  document.getElementById('sheet').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
}
function copiarRecibido(){
  let t='*LO RECIBIDO (con ajustes)*\n\n';let tot=0;
  ruteros.forEach(r=>{const vs=viajes.filter(v=>v.rutero===r);let l='';
    vs.forEach(v=>v.pedidos.forEach(p=>{
      let val=p.estado==='credito'?'crédito '+q(p.total):(p.estado==='cancelado'?'no entregó':q(efectivoDe(p)));
      if(p.estado!=='credito'&&p.estado!=='cancelado')tot+=efectivoDe(p);
      l+=`${p.nombre}: ${val}\n`;}));
    if(l)t+=`*${r}*\n${l}\n`;
  });
  t+=`TOTAL EFECTIVO: ${q(tot)}`;
  navigator.clipboard.writeText(t).then(()=>toast('Copiado ✓')).catch(()=>toast('No se pudo',true));
}
function copiarOriginales(){
  let t='*MONTOS ORIGINALES DEL DÍA*\n(para cruzar con sistema)\n\n';let tot=0,n=0;
  ruteros.forEach(r=>{const vs=viajes.filter(v=>v.rutero===r);let l='';
    vs.forEach(v=>v.pedidos.forEach(p=>{tot+=p.total;n++;l+=`${p.nombre}: ${q(p.total)}\n`;}));
    if(l)t+=`*${r}*\n${l}\n`;
  });
  t+=`TOTAL: ${n} pedidos · ${q(tot)}`;
  navigator.clipboard.writeText(t).then(()=>toast('Copiado ✓')).catch(()=>toast('No se pudo',true));
}
function copiarReporte(){
  let efvDia=0,credDia=0,lineas=[];
  ruteros.forEach(r=>{const vs=viajes.filter(v=>v.rutero===r);if(!vs.length)return;
    const tot=totalRutero(r);let det=[];
    vs.forEach(v=>v.pedidos.forEach(p=>{
      if(p.estado==='credito'){credDia+=p.total||0;det.push(`  ${p.nombre}: crédito ${q(p.total)}`);return;}
      if(p.estado==='cancelado'){det.push(`  ${p.nombre}: no entregó`);return;}
      efvDia+=efectivoDe(p);
      if(p.devolucion)det.push(`  ${p.nombre}: devolución ${q(p.devolucion)}`);
      if(p.descuento)det.push(`  ${p.nombre}: descuento ${q(p.descuento)}`);
      if(p.vuelto)det.push(`  ${p.nombre}: vuelto ${q(p.vuelto)}`);
    }));
    lineas.push(`*${r}*: ${q(tot)}`+(det.length?'\n'+det.join('\n'):''));
  });
  let t=`*CUADRE DEL DÍA*\nEfectivo total: ${q(efvDia)}\n`;
  if(credDia>0)t+=`Crédito total: ${q(credDia)}\n`;
  t+='\n'+lineas.join('\n');
  navigator.clipboard.writeText(t).then(()=>toast('Copiado ✓')).catch(()=>toast('No se pudo copiar',true));
}

let _initDone=false;
async function iniciar(){
  try{ await cargarNube(); }catch(e){ console.log('init carga falló',e); }
  if(!selRutero&&ruteros.length)selRutero=ruteros[0];
  _cargando=false; _initDone=true;
  renderRuteros();renderZona();
  // Sincronización en vivo
  try{
    sb.channel('dia-'+HOY)
      .on('postgres_changes',{event:'*',schema:'public',table:'dias',filter:'fecha=eq.'+HOY},async()=>{
        if(guardando)return;
        const sel=selRutero, va=viajeAbierto;
        _cargando=true; await cargarNube(); _cargando=false;
        selRutero=sel&&ruteros.includes(sel)?sel:(ruteros[0]||null);
        viajeAbierto=va;
        renderRuteros();renderZona();
      }).subscribe();
  }catch(e){console.log('realtime no disponible',e);}
  // Respaldo cada 20s
  setInterval(async()=>{
    if(guardando)return;
    const sel=selRutero, va=viajeAbierto;
    _cargando=true; await cargarNube(); _cargando=false;
    selRutero=sel&&ruteros.includes(sel)?sel:(ruteros[0]||null);
    viajeAbierto=va;
    renderRuteros();renderZona();
  },20000);
}
iniciar();
</script>
